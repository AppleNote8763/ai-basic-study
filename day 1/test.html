<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 문자 인코딩을 UTF-8로 설정한다 => 한글이 깨지지 않게 하기 위해서 사용 -->
    <meta charset="UTF-8">

    <!-- 모바일 화면에서도 페이지가 알맞은 크기로 보이게 한다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 브라우저 탭에 표시되는 페이지 제목 -->
    <title>최윤수의 웹페이지</title>
</head>
<body>

    <h1>안녕하세요</h1>

    <p>최윤수의 첫 번째 웹페이지입니다.</p>

    <a href="about.html">
        <button>자기소개 페이지로 이동</button>
    </a>

</body>
</html>

<!-- 
    HTML 구조 생성 : ! + Enter
    주석 작성      : Ctrl + /

    ** HTML 태그 : 웹페이지의 구조와 내용을 정의하는 기본 단위
        <>기호로 묶인 요소
        - 여는 태그 <tag>
        - 내용 (Content)
        - 닫는 태그 <tag>
-->
