<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAI API fetch 실습</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="box">
      <h1>OpenAI API fetch 실습</h1>
      <p>영화 제목을 입력하면 AI가 짧은 추천 문구를 생성합니다.</p>

      <div class="form-group">
        <label for="movieTitle">영화 제목</label>
        <input id="movieTitle" class="input-field" type="text" placeholder="예: 인터스텔라">
      </div>

      <button id="recommendBtn" class="btn" type="button">추천 문구 만들기</button>

      <div id="aiResult" class="result-box">
        AI 응답이 여기에 표시됩니다.
      </div>
    </section>
  </main>

  <script src="js/05openai-fetch.js"></script>

</body>
</html>
