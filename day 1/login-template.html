<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 설명: 한글이 깨지지 않도록 UTF-8을 사용합니다. -->
  <meta charset="UTF-8">

  <!-- 설명: 모바일 화면에서도 알맞게 보이도록 설정합니다. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>로그인</title>

  <!-- HTML 문서와 CSS 파일 연결 -->
  <link rel="stylesheet" href="css/style-template.css">
</head>
<body>
  <!-- 실습 흐름: 먼저 화면에 어떤 요소가 필요한지 학생들과 확인합니다. -->
  <main class="page">
    <section class="form-box">
      <!-- h1태그: 로그인 페이지의 가장 큰 제목을 작성합니다. 예: 로그인 -->
      <h1 class="page-title">로그인</h1>

      <!-- p태그: 사용자에게 입력을 안내하는 문장을 작성합니다. -->
      <p>아이디와 비밀번호를 입력하세요</p>

      <!-- 설명: form은 입력 요소를 묶는 태그입니다.
            사용자에게 입력받는 정보들 -->
      <form>
        <div>
          <!-- label: 아이디 입력칸의 이름표를 작성합니다. -->
          <label for="loginId">아이디</label>

          <!-- input: placeholder에는 입력 전 안내 문구를 작성합니다. -->
          <input id="loginId" class="input-field" type="text" placeholder="아이디를 입력하세요">
        </div>

        <div>
          <!-- label: 비밀번호 입력칸의 이름표를 작성합니다. -->
          <label for="loginPw">비밀번호</label>

          <!-- 설명: type="password"는 입력한 값이 화면에 그대로 보이지 않게 합니다. -->
          <input id="loginPw" class="input-field" type="password" placeholder="비밀번호를 입력하세요">
        </div>

        <!-- button: 버튼 안에 화면에 보일 글자를 작성합니다. 예: 로그인 -->
        <button type="button" class="btn" id="loginBtn">로그인</button>

        <!-- a태그: 회원가입 페이지로 이동하는 링크를 작성합니다. -->
        <p class="link-text">
          <!-- 예: 아직 회원이 아니신가요? -->
          아직 회원이 아니신가요?
          <!-- 회원가입 안내 문구 -->

          <!-- href에는 이동할 파일명을 작성합니다. 예: signup.html -->
          <a href="signup-template.html">회원가입</a>
        </p>
      </form>
    </section>
  </main>

  <!-- JavaScript 파일을 연결하는 공간 -->
  <script src="js/script.js"></script>
</body>
</html>
