<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- 설명: 한글이 깨지지 않도록 설정합니다. -->
  <meta charset="UTF-8">

  <!-- 설명: 모바일 화면 대응을 위한 설정입니다. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>갤러리</title>
</head>
<body>
  <!-- 실습 흐름: 갤러리는 같은 구조의 카드가 반복된다는 점을 먼저 설명합니다. -->
  <header>
    <!-- 실습 1: 페이지 제목을 작성합니다. 예: 갤러리 -->
    <h1><!-- 페이지 제목 --></h1>

    <!-- 실습 2: 갤러리 소개 문구를 작성합니다. -->
    <p><!-- 페이지 안내 문구 --></p>
  </header>

  <main>
    <section>
      <!-- 실습 3: 섹션 제목을 작성합니다. 예: 추천 이미지 -->
      <h2><!-- 섹션 제목 --></h2>

      <!-- 설명: article은 카드 하나처럼 독립적인 콘텐츠를 표현할 때 사용합니다. -->
      <article>
        <!-- 실습 4: alt에는 이미지가 무엇인지 설명하는 문구를 작성합니다. -->
        <img src="https://placehold.co/500x300?text=Work" alt="<!-- 이미지 설명 -->">

        <!-- 실습 5: 카드 제목을 작성합니다. -->
        <h3><!-- 카드 제목 --></h3>

        <!-- 실습 6: 카드 설명 문장을 작성합니다. -->
        <p><!-- 카드 설명 --></p>

        <!-- 실습 7: 링크 문구를 작성합니다. href="#"는 아직 실제 이동 주소가 없다는 의미입니다. -->
        <a href="#"><!-- 링크 문구 --></a>
      </article>
    </section>
  </main>

  <footer>
    <!-- 실습 8: 페이지 하단 문구를 작성합니다. -->
    <p><!-- 푸터 문구 --></p>
  </footer>
</body>
</html>
